<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Voila! Hybrid Figures</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #e8dfd0;
      --paper: #f5ecd9;
      --paper-soft: #efe3cc;
      --text: #2f2a24;
      --heading: #241e19;
      --muted: #75695c;
      --border: #d7c5a8;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #eee4d2 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
    }

    main {
      max-width: 1180px;
      margin: 40px auto;
      padding: 34px;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 22px 58px rgba(62, 45, 28, 0.16);
    }

    h1 {
      margin-top: 0;
      color: var(--heading);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(255,255,255,0.34);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 6px;
      color: var(--heading);
      font-size: 22px;
    }

    .card p {
      margin: 6px 0;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: white;
    }
  </style>
</head>
<body>
  <main>
    <h1>Voila! Hybrid Figure Extraction</h1>
    <p>Source: <code>D:\dev\projects\voila\data\input\Manual-de-Supravietuire.pdf</code></p>
    <p>Page range: 1–234</p>
    <p>Detected figures: 0</p>
    <div class="grid">
      
            <article class="card">
              <h2>No figures detected</h2>
              <p>No figure captions were detected in this range.</p>
            </article>
            
    </div>
  </main>
</body>
</html>
